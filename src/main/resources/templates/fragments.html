<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <title></title></head>
<body>
    <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img th:src="@{/images/logo.png}" alt="Logo" width="45" height="45" class="me-3 rounded-circle border border-2 logo-circle">
                <div class="brand-text-container">
                    <span class="brand-name">Lumina Judicial</span>
                    <span class="brand-subtext text-muted">Interpreting, LLC</span>
                </div>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <!--/*@thymesVar id="activePage" type="ch"*/-->
                        <a class="nav-link" th:classappend="${activePage == 'home'} ? 'active' : ''" href="/" th:text="#{home}">Home</a>
                    </li>
                    <li class="nav-item">
                        <!--/*@thymesVar id="activePage" type="ch"*/-->
                        <a class="nav-link" th:classappend="${activePage == 'about'} ? 'active' : ''" href="/about" th:text="#{about}">About</a>
                    </li>
                    <li class="nav-item">
                        <!--/*@thymesVar id="activePage" type="ch"*/-->
                        <a class="nav-link" th:classappend="${activePage == 'contact'} ? 'active' : ''" href="/contact" th:text="#{contact}">Contact</a>
                    </li>
                    <li class="nav-item">
                        <!--/*@thymesVar id="activePage" type="ch"*/-->
                        <a class="nav-link" th:classappend="${activePage == 'schedule'} ? 'active' : ''" href="/schedule" th:text="#{schedule}">Schedule</a>
                    </li>
                    <li class="nav-item dropdown ms-lg-3">
                        <a class="nav-link dropdown-toggle" href="#" id="langDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-translate me-1"></i>Language
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="?lang=en">English</a></li>
                            <li><a class="dropdown-item" href="?lang=es">Español</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</body>
</html>
